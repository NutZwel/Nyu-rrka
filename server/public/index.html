<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0B0B0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<title>Nyu'rka</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0B0B0F;color:#fff;font-family:-apple-system,system-ui,Helvetica,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}
input{font-family:inherit;-webkit-appearance:none}

/* ── App shell ── */
.app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#0B0B0F;position:relative;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{display:none}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px;flex-shrink:0}
.logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo span{color:#4A6CF7}
.avatar{width:32px;height:32px;border-radius:50%;background:#1A1A2E;cursor:pointer}

/* ── Search ── */
.search{margin:0 20px 16px;position:relative}
.search input{width:100%;background:#13131A;border:1px solid #1C1C28;border-radius:14px;color:#fff;font-size:14px;padding:12px 14px 12px 40px;outline:none;transition:border .2s}
.search input:focus{border-color:#4A6CF750}
.search input::placeholder{color:#555}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#555;font-size:14px;pointer-events:none}

/* ── Section ── */
.section{margin-bottom:20px}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:10px}
.section-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.section-more{font-size:12px;color:#4A6CF7;cursor:pointer;background:0;border:0}

/* ── Horizontal scroll ── */
.hscroll{display:flex;gap:12px;overflow-x:auto;padding:0 20px;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
.hscroll::-webkit-scrollbar{display:none}
.hscroll-item{flex-shrink:0;scroll-snap-align:start;cursor:pointer;transition:transform .15s}
.hscroll-item:active{transform:scale(.97)}

/* ── Discover cards ── */
.discover-card{width:200px;height:120px;border-radius:16px;overflow:hidden;position:relative;background:#1A1A2E;padding:14px;display:flex;flex-direction:column;justify-content:flex-end}
.discover-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.3}
.discover-card .overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.7) 100%)}
.discover-card .text{position:relative;z-index:1}
.discover-card .text h3{font-size:14px;font-weight:700;line-height:1.2}
.discover-card .text p{font-size:10px;color:#aaa;margin-top:3px}

/* ── Song card (popular today) ── */
.song-card{width:140px;cursor:pointer}
.song-card .cover{width:140px;height:140px;border-radius:14px;overflow:hidden;background:#1A1A2E;position:relative;margin-bottom:8px}
.song-card .cover img{width:100%;height:100%;object-fit:cover}
.song-card .cover .play-btn{position:absolute;bottom:8px;right:8px;width:32px;height:32px;border-radius:50%;background:#4A6CF7;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:0;transform:translateY(4px);transition:all .2s}
.song-card:active .cover .play-btn{opacity:1;transform:translateY(0)}
.song-card .card-title{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.song-card .card-artist{font-size:11px;color:#888;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Song list item ── */
.song-row{display:flex;align-items:center;gap:10px;padding:6px 20px;cursor:pointer;transition:background .15s}
.song-row:active{background:#1A1A1E}
.song-row .art{width:44px;height:44px;border-radius:10px;flex-shrink:0;object-fit:cover;background:#1A1A2E}
.song-row .info{flex:1;min-width:0}
.song-row .info .t{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.song-row .info .m{font-size:11px;color:#888;margin-top:2px}
.song-row .more{color:#555;font-size:16px;padding:4px;background:0;border:0;cursor:pointer}

/* ── Now Playing Bar ── */
.np{display:none;align-items:center;gap:10px;margin:0 12px;padding:8px 10px;background:#13131A;border-radius:14px;cursor:pointer;flex-shrink:0;position:relative;overflow:hidden}
.np.active{display:flex}
.np .bar{position:absolute;bottom:0;left:0;height:2px;background:#4A6CF7;transition:width .3s}
.np .cover{width:36px;height:36px;border-radius:8px;flex-shrink:0;object-fit:cover;background:#1A1A2E}
.np .info{flex:1;min-width:0}
.np .info .t{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.np .info .a{font-size:10px;color:#888;margin-top:1px}
.np .play{width:32px;height:32px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;color:#000;flex-shrink:0;cursor:pointer;border:0}

/* ── Nav ── */
.nav{display:flex;background:#0B0B0F;border-top:1px solid #1A1A1E;padding:6px 0 calc(6px + env(safe-area-inset-bottom));flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:0;border:0;color:#444;font-size:16px;padding:4px;cursor:pointer;transition:color .15s}
.nav-btn.active{color:#fff}
.nav-btn .lbl{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:2px}

/* ── Player Screen ── */
.player-screen{position:fixed;inset:0;max-width:480px;margin:0 auto;background:#0B0B0F;z-index:100;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.player-screen.open{transform:translateY(0)}
.player-screen .p-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;flex-shrink:0}
.player-screen .p-header button{background:0;border:0;color:rgba(255,255,255,.6);font-size:16px;padding:8px;cursor:pointer}
.player-screen .p-header .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.5)}
.player-screen .p-cover{flex:1;display:flex;align-items:center;justify-content:center;padding:0 24px;min-height:0}
.player-screen .p-cover img{width:100%;max-width:340px;aspect-ratio:1/1;object-fit:cover;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.player-screen .p-body{flex-shrink:0;padding:8px 24px 16px}
.player-screen .p-info{margin-bottom:8px}
.player-screen .p-info .title{font-size:18px;font-weight:700}
.player-screen .p-info .artist{font-size:13px;color:#aaa;margin-top:2px}
.player-screen .p-progress{margin-bottom:4px}
.player-screen .p-bar{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer}
.player-screen .p-fill{height:100%;background:#fff;border-radius:2px;width:0;transition:width .1s}
.player-screen .p-time{display:flex;justify-content:space-between;font-size:10px;color:#888;margin-top:4px;font-variant-numeric:tabular-nums}
.player-screen .p-ctrls{display:flex;align-items:center;justify-content:center;gap:28px;padding:4px 0}
.player-screen .p-ctrls button{background:0;border:0;cursor:pointer;color:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;padding:4px}
.player-screen .p-ctrls button.on{color:#4A6CF7}
.player-screen .p-ctrls .sm{font-size:18px}
.player-screen .p-ctrls .md{font-size:24px}
.player-screen .p-ctrls .lg{width:52px;height:52px;border-radius:50%;background:#fff;color:#000;font-size:22px}
.player-screen .p-ctrls .lg:active{transform:scale(.93)}

/* ── Search results overlay ── */
.search-results{flex:1;overflow-y:auto;padding-bottom:8px}
.search-results .sr-item{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;transition:background .15s}
.search-results .sr-item:active{background:#13131A}
.search-results .sr-item .art{width:44px;height:44px;border-radius:8px;flex-shrink:0;object-fit:cover;background:#1A1A2E}
.search-results .sr-item .info{flex:1;min-width:0}
.search-results .sr-item .info .t{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-results .sr-item .info .m{font-size:11px;color:#888;margin-top:2px}
.search-results .sr-item .add{background:0;border:0;color:#4A6CF7;font-size:16px;padding:6px;cursor:pointer;border-radius:8px}
.search-results .sr-item .add:active{background:#4A6CF720}
.search-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#555;font-size:13px;gap:8px}

/* ── Toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:#4A6CF7;color:#fff;padding:10px 24px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:all .25s cubic-bezier(.16,1,.3,1);z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

<!-- Main Content -->
<div class="screen" id="main-screen">

  <!-- Header -->
  <div class="header">
    <div class="logo">♫ Nyu<span>'rka</span></div>
    <div class="avatar" onclick="toast('Settings coming soon')"></div>
  </div>

  <!-- Search -->
  <div class="search">
    <span class="search-icon">⌕</span>
    <input id="search-input" placeholder="Search songs, artists..." autocomplete="off" enterkeyhint="search">
  </div>

  <!-- Empty state -->
  <div id="home-content">
    <div class="section" id="sec-popular" style="display:none">
      <div class="section-header"><span class="section-title">Popular Today</span></div>
      <div class="hscroll" id="popular-scroll"></div>
    </div>

    <div class="section" id="sec-recent" style="display:none">
      <div class="section-header"><span class="section-title">Recently Played</span></div>
      <div id="recent-list"></div>
    </div>

    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;text-align:center">
      <div style="font-size:48px;opacity:.3">♫</div>
      <div style="font-size:16px;font-weight:600;color:#888">Discover Music</div>
      <div style="font-size:12px;color:#555;line-height:1.5">Search for songs and start listening.<br>Your recently played tracks will appear here.</div>
    </div>
  </div>

  <!-- Search results (hidden by default) -->
  <div id="search-results" class="search-results" style="display:none"></div>
  <div id="search-msg" class="search-msg" style="display:none"></div>

</div>

<!-- Now Playing Bar -->
<div class="np" id="np-bar" onclick="openPlayer()">
  <div class="bar" id="np-bar-fill" style="width:0%"></div>
  <img class="cover" id="np-cover" src="">
  <div class="info">
    <div class="t" id="np-title">-</div>
    <div class="a" id="np-artist">-</div>
  </div>
  <button class="play" id="np-play" onclick="event.stopPropagation();togglePlay()">▶</button>
</div>

<!-- Bottom Nav -->
<div class="nav">
  <button class="nav-btn active" data-tab="home" onclick="switchTab('home')">🏠<span class="lbl">Home</span></button>
  <button class="nav-btn" data-tab="search" onclick="switchTab('search')">⌕<span class="lbl">Search</span></button>
  <button class="nav-btn" data-tab="queue" onclick="switchTab('queue')">≡<span class="lbl">Queue</span></button>
</div>

<!-- Player Screen (slides up) -->
<div class="player-screen" id="player-screen">
  <div class="p-header">
    <button onclick="closePlayer()">▼</button>
    <span class="label">Now Playing</span>
    <button onclick="toggleArtShape()" style="font-size:14px">◻</button>
  </div>
  <div class="p-cover">
    <img id="p-cover-img" src="" onerror="this.style.background='#1A1A2E';this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 1 1\\'/>'">
  </div>
  <div class="p-body">
    <div class="p-info">
      <div class="title" id="p-title">-</div>
      <div class="artist" id="p-artist">-</div>
    </div>
    <div class="p-progress">
      <div class="p-bar" id="seek-bar" onclick="seekTo(event)">
        <div class="p-fill" id="seek-fill" style="width:0%"></div>
      </div>
      <div class="p-time">
        <span id="p-curr">0:00</span>
        <span id="p-dur">-:--</span>
      </div>
    </div>
    <div class="p-ctrls">
      <button class="sm" id="s-btn" onclick="toggleShuffle()">⇄</button>
      <button class="md" onclick="prevTrack()">⏮</button>
      <button class="lg" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="md" onclick="nextTrack()">⏭</button>
      <button class="sm" id="l-btn" onclick="toggleLoop()">↺</button>
    </div>
  </div>
</div>

<!-- Queue Modal (slides up) -->
<div id="queue-modal" style="position:fixed;inset:0;max-width:480px;margin:0 auto;background:#0B0B0F;z-index:100;display:none;flex-direction:column">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px">
    <button onclick="closeQueue()" style="background:0;border:0;color:#fff;font-size:16px;padding:8px;cursor:pointer">✕</button>
    <span style="font-size:14px;font-weight:700">Queue</span>
    <button onclick="clearQ()" style="background:0;border:0;color:#4A6CF7;font-size:12px;padding:8px;cursor:pointer">Clear</button>
  </div>
  <div id="q-list" style="flex:1;overflow-y:auto;padding-bottom:8px"></div>
  <div id="q-empty" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#555;font-size:13px;gap:8px;display:none">
    <div style="font-size:32px;color:#1A1A2E">≡</div>
    Queue is empty
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
const API=''
let q=[],qi=-1,cur=null,isPlay=false,vol=.7,lp='none',sf=false,loading=false
const a=new Audio();a.preload='auto'
const $=x=>document.getElementById(x)
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c])
const fmt=s=>s?Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'):'0:00'
const recent=JSON.parse(localStorage.getItem('nyurka_recent')||'[]')

let tm
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(tm);tm=setTimeout(()=>t.classList.remove('show'),1800)}

function saveRecent(t){
  const arr=recent.filter(r=>r.id!==t.id);arr.unshift(t);recent.length=0;recent.push(...arr.slice(0,10))
  localStorage.setItem('nyurka_recent',JSON.stringify(recent));renderRecent()
}

function renderRecent(){
  if(!recent.length)return
  $('sec-recent').style.display='block'
  $('recent-list').innerHTML=recent.map(t=>`<div class="song-row" onclick="playTrack(q.length,${JSON.stringify(t).replace(/"/g,'&quot;')})">
    <img class="art" src="${esc(t.thumbnail)}" onerror="this.src='/apple-icon.png'">
    <div class="info"><div class="t">${esc(t.title)}</div><div class="m">${esc(t.channel)} · ${fmt(t.duration)}</div></div></div>`).join('')
}

// ── Nav ──
function switchTab(tab){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'))
  document.querySelector(`.nav-btn[data-tab="${tab}"]`).classList.add('active')
  closePlayer();closeQueue()
  if(tab==='search')switchToSearch()
  else if(tab==='queue')openQueue()
  else{switchToHome()}
}
function switchToHome(){
  $('home-content').style.display='block'
  $('search-results').style.display='none'
  $('search-msg').style.display='none'
  $('search-input').value=''
  $('search-input').blur()
}
function switchToSearch(){
  $('home-content').style.display='none'
  $('search-results').style.display='none'
  $('search-msg').style.display='flex'
  $('search-msg').textContent='Search for music'
  setTimeout(()=>$('search-input').focus(),200)
}

// ── Search ──
let st
$('search-input').addEventListener('input',e=>{
  clearTimeout(st);const q=e.target.value.trim()
  if(q.length<3){$('search-results').style.display='none';$('home-content').style.display='none';$('search-msg').style.display='flex';$('search-msg').textContent='Type at least 3 characters';return}
  st=setTimeout(()=>doSearch(q),300)
})
$('search-input').addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(st);doSearch(e.target.value.trim())}})

async function doSearch(q){
  $('home-content').style.display='none';$('search-results').style.display='none';$('search-msg').style.display='flex';$('search-msg').textContent='Searching...'
  try{const r=await fetch(API+'/api/search?q='+encodeURIComponent(q));const d=await r.json();renderSearch(d)}
  catch{$('search-msg').textContent='Search failed'}
}
function renderSearch(r){
  if(!r.length){$('search-msg').textContent='No results';$('search-msg').style.display='flex';$('search-results').style.display='none';return}
  $('search-msg').style.display='none';$('search-results').style.display='block'
  window._lastResults=r
  $('search-results').innerHTML=r.map((t,i)=>`<div class="sr-item" style="animation:fadeUp .3s ${i*25}ms both">
    <img class="art" src="${esc(t.thumbnail)}" onerror="this.src='/apple-icon.png'">
    <div class="info"><div class="t">${esc(t.title)}</div><div class="m">${esc(t.channel)} · ${fmt(t.duration)}</div></div>
    <button class="add" onclick="event.stopPropagation();addToQ(window._lastResults[${i}]);toast('Added to queue')">+</button></div>`).join('')
  $('search-results').querySelectorAll('.sr-item').forEach((el,i)=>{
    el.onclick=()=>{const t=r[i];addToQ(t);playTrack(q.length)}
  })
}

// ── Queue ──
function addToQ(t){
  q.push(t)
  if(q.length===1&&!cur){playTrack(0)}
  renderQ()
  if($('queue-modal').style.display!=='flex'){toast('Added to queue')}
}
function renderQ(){
  if(!q.length){$('q-list').innerHTML='';$('q-empty').style.display='flex';return}
  $('q-empty').style.display='none'
  $('q-list').innerHTML=q.map((t,i)=>`<div class="song-row${i===qi?'':''}" onclick="playTrack(${i})">
    <img class="art" src="${esc(t.thumbnail)}" onerror="this.src='/apple-icon.png'" style="border-radius:8px">
    <div class="info"><div class="t"${i===qi?' style="color:#4A6CF7"':''}>${esc(t.title)}</div><div class="m">${esc(t.channel)}</div></div>
    <button class="more" onclick="event.stopPropagation();delQ(${i})" style="font-size:12px;color:#555">✕</button></div>`).join('')
}
function delQ(i){q.splice(i,1);if(i<qi)qi--;else if(i===qi){qi=-1;cur=null;updPlayer();$('np-bar').classList.remove('active')}renderQ()}
function clearQ(){q=[];qi=-1;cur=null;a.pause();a.removeAttribute('src');a.load();isPlay=false;loading=false;updPlayer();renderQ();closeQueue();toast('Cleared')}
function openQueue(){if(!q.length){$('q-empty').style.display='flex'}$('queue-modal').style.display='flex';renderQ()}
function closeQueue(){$('queue-modal').style.display='none'}

// ── Player ──
function openPlayer(){if(!cur)return;$('player-screen').classList.add('open')}
function closePlayer(){$('player-screen').classList.remove('open')}
function toggleArtShape(){toast('Coming soon')}

function playTrack(idx,t){
  if(t){
    q.push(t);qi=q.length-1
  }else if(idx>=0){
    qi=idx
  }
  cur=q[qi];loading=false
  renderQ();updPlayer();startStream(cur.id);saveRecent(cur)
  openPlayer()
}
function updPlayer(){
  if(!cur){$('np-bar').classList.remove('active');$('play-btn').textContent='▶';return}
  const img=cur.thumbnail||''
  $('np-bar').classList.add('active')
  $('np-cover').src=img;$('np-title').textContent=cur.title;$('np-artist').textContent=cur.channel
  $('p-cover-img').src=img;$('p-title').textContent=cur.title;$('p-artist').textContent=cur.channel
  updMediaSession()
}
function startStream(id){
  loading=true;$('play-btn').textContent='⏳';isPlay=false
  if('mediaSession'in navigator)navigator.mediaSession.playbackState='none'
  a.pause();a.removeAttribute('src');a.load()
  a.src=API+'/api/stream/'+id;a.load()
  let fired=false
  a.addEventListener('canplay',function cp(){a.removeEventListener('canplay',cp);fired=true;if(!loading)return;loading=false;doPlay()},{once:true})
  a.addEventListener('error',function er(){a.removeEventListener('error',er);if(!loading)return;loading=false;$('play-btn').textContent='▶';toast('Skipping...');setTimeout(nxt,1500)},{once:true})
  setTimeout(()=>{if(loading&&!fired){loading=false;$('play-btn').textContent='▶';toast('Timeout');setTimeout(nxt,1500)}},35000)
}
function doPlay(){
  a.play().catch(()=>setTimeout(()=>a.play().catch(()=>{if(!loading)return;loading=false;$('play-btn').textContent='▶';toast('Play failed');setTimeout(nxt,1500)}),500))
  isPlay=true;$('play-btn').textContent='⏸';$('np-play').textContent='⏸'
  updMediaSession()
}
function togglePlay(){
  if(!cur)return
  if(isPlay){a.pause();$('play-btn').textContent='▶';$('np-play').textContent='▶'}
  else{a.play().catch(()=>{});$('play-btn').textContent='⏸';$('np-play').textContent='⏸'}
  isPlay=!isPlay
  if('mediaSession'in navigator)navigator.mediaSession.playbackState=isPlay?'playing':'paused'
}
function nxt(){
  if(!q.length)return;loading=false;a.pause()
  if(lp==='one'){a.currentTime=0;doPlay();return}
  const ni=sf?Math.floor(Math.random()*q.length):qi<q.length-1?qi+1:0
  playTrack(ni)
}
function prevTrack(){if(!q.length||qi<=0)return;loading=false;a.pause();playTrack(qi-1)}
function seekTo(e){const r=e.currentTarget.getBoundingClientRect();const p=(e.clientX-r.left)/r.width;if(a.duration)a.currentTime=p*a.duration}
function setV(v){vol=v;a.volume=v}

// Media Session
function updMediaSession(){
  if(!('mediaSession'in navigator)||!cur)return
  navigator.mediaSession.metadata=new MediaMetadata({title:cur.title,artist:cur.channel,artwork:[{src:cur.thumbnail||'/apple-icon.png',sizes:'512x512',type:'image/png'}]})
  navigator.mediaSession.playbackState=isPlay?'playing':'paused'
  navigator.mediaSession.setActionHandler('play',()=>togglePlay())
  navigator.mediaSession.setActionHandler('pause',()=>togglePlay())
  navigator.mediaSession.setActionHandler('nexttrack',()=>nxt())
  navigator.mediaSession.setActionHandler('previoustrack',()=>prevTrack())
}

// Audio events
a.addEventListener('timeupdate',()=>{
  if(!a.duration)return
  const p=a.currentTime/a.duration*100
  $('seek-fill').style.width=p+'%';$('np-bar-fill').style.width=p+'%'
  $('p-curr').textContent=fmt(a.currentTime);$('p-dur').textContent=fmt(a.duration)
})
a.addEventListener('ended',()=>{if(lp==='one'){a.currentTime=0;a.play().catch(()=>{});return}isPlay=false;nxt()})
a.addEventListener('loadedmetadata',()=>{$('p-dur').textContent=fmt(a.duration)})
a.addEventListener('error',()=>{$('play-btn').textContent='▶';$('np-play').textContent='▶';isPlay=false})

// ── Animations ──
const style=document.createElement('style')
style.textContent='@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}'
document.head.appendChild(style)

renderQ();renderRecent()
</script>
</body>
