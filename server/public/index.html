<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<title>Nyu'rka</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#app{height:100%;background:#121212;color:#fff;font-family:-apple-system,system-ui,Helvetica,sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none}

/* ── Slim scrollbar ── */
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

/* ── Range slider ── */
input[type=range]{-webkit-appearance:none;appearance:none;height:2px;outline:none;cursor:pointer;background:rgba(255,255,255,.15);width:100%;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:0;height:0;border-radius:50%;background:#fff;transition:all.1s}
input[type=range]:active::-webkit-slider-thumb{width:10px;height:10px}

/* ── Layout ── */
#app{display:flex;flex-direction:column}
.content{flex:1;overflow:hidden;position:relative}

/* ── Screens ── */
.screen{display:none;flex-direction:column;height:100%;position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:flex}
.screen-title{padding:14px 16px 8px;font-size:22px;font-weight:700;letter-spacing:-.4px;flex-shrink:0}

/* ── Bottom bar ── */
.np-bar{display:none;align-items:center;gap:10px;padding:8px 12px;background:#181818;cursor:pointer;flex-shrink:0;border-bottom:1px solid #282828;min-height:56px;position:relative}
.np-bar.active{display:flex}
.np-bar:active{background:#1e1e1e}
.np-cover{width:40px;height:40px;border-radius:4px;flex-shrink:0;object-fit:cover;background:#282828}
.np-info{flex:1;min-width:0}
.np-title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.np-artist{font-size:11px;color:#aaa;margin-top:1px}
.np-actions{display:flex;align-items:center;gap:8px}
.np-icon{color:#aaa;font-size:20px;padding:4px;cursor:pointer}
.np-bar-progress{position:absolute;top:0;left:0;height:2px;background:#1DB954;transition:width .2s}

/* ── Nav ── */
.nav{display:flex;background:#090909;flex-shrink:0;padding:4px 0 calc(4px + env(safe-area-inset-bottom));z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:0;border:0;color:#555;font-size:18px;padding:4px 0;cursor:pointer;transition:color.15s}
.nav-btn.active{color:#fff}
.nav-label{font-size:9px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}

/* ── Player (full) ── */
.player{display:flex;flex-direction:column;height:100%;padding:0 16px;position:relative}
.player-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.player-bg img{width:100%;height:100%;object-fit:cover;filter:blur(60px) brightness(.35);transform:scale(1.2);opacity:0;transition:opacity.5s}
.player-bg img.show{opacity:1}
.player-top{display:flex;align-items:center;justify-content:space-between;padding:8px 0;position:relative;z-index:1;flex-shrink:0}
.player-top-btn{background:0;border:0;color:rgba(255,255,255,.6);font-size:14px;padding:8px;cursor:pointer}
.player-top-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.6)}

.player-cover-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;min-height:0;padding:4px 0}
.player-cover{width:min(80vw,320px);height:min(80vw,320px);border-radius:4px;overflow:hidden;box-shadow:0 4px 60px rgba(0,0,0,.5);background:#181818;transition:border-radius.3s;position:relative}
.player-cover.round{border-radius:50%}
.player-cover img{width:100%;height:100%;object-fit:cover}
.player-cover.round img{animation:spin 25s linear infinite;animation-play-state:paused}
.player-cover.round.play img{animation-play-state:running}
@keyframes spin{to{transform:rotate(360deg)}}

.player-body{position:relative;z-index:1;padding:8px 0 4px;flex-shrink:0}
.player-body .track-info{margin-bottom:2px}
.player-body .track-title{font-size:16px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-body .track-artist{font-size:12px;color:#aaa;margin-top:1px}
.player-body .progress-wrap{margin:6px 0 2px}
.player-body .progress-bar{width:100%;height:3px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;position:relative}
.player-body .progress-fill{height:100%;background:#fff;border-radius:2px;width:0;position:relative;transition:width .1s}
.player-body .progress-fill::after{content:'';position:absolute;right:-5px;top:-3.5px;width:10px;height:10px;border-radius:50%;background:#fff;opacity:0}
.player-body .progress-bar:hover .progress-fill::after{opacity:1}
.player-body .progress-time{display:flex;justify-content:space-between;font-size:10px;color:#888;margin-top:3px;font-variant-numeric:tabular-nums}
.player-body .ctrls{display:flex;align-items:center;justify-content:center;gap:20px;padding:6px 0}
.player-body .ctrls button{background:0;border:0;cursor:pointer;transition:all.15s;display:flex;align-items:center;justify-content:center}
.player-body .ctrls .sml{color:rgba(255,255,255,.5);font-size:14px;padding:6px}
.player-body .ctrls .sml.on{color:#1DB954}
.player-body .ctrls .med{color:rgba(255,255,255,.7);font-size:22px;padding:8px}
.player-body .ctrls .med:active{color:#fff;transform:scale(.92)}
.player-body .ctrls .big{width:56px;height:56px;border-radius:50%;background:#fff;color:#000;font-size:26px}
.player-body .ctrls .big:active{transform:scale(.92)}
.player-body .vol{margin-top:2px;display:flex;align-items:center;gap:6px}
.player-body .vol span{font-size:10px;color:#888;min-width:18px;text-align:center}

/* ── Empty player ── */
.player-empty{align-items:center;justify-content:center;display:flex;flex-direction:column;text-align:center;gap:8px;position:relative;z-index:1;height:100%}
.player-empty .big-icon{width:200px;height:200px;border-radius:50%;background:#181818;display:flex;align-items:center;justify-content:center;font-size:60px;color:#333;margin-bottom:4px}
.player-empty h1{font-size:22px;font-weight:700;letter-spacing:-.4px}
.player-empty p{font-size:13px;color:#888}
.player-empty button{margin-top:12px;background:rgba(255,255,255,.08);border:0;color:#fff;font-size:14px;font-weight:600;padding:12px 32px;border-radius:20px;cursor:pointer}

/* ── Search ── */
.search-header{padding:12px 16px;flex-shrink:0}
.search-header input{width:100%;background:#282828;border:0;border-radius:8px;color:#fff;font-size:14px;padding:10px 14px;outline:none}
.search-header input::placeholder{color:#666}
.search-header input:focus{background:#333;outline:1px solid #555}

.search-res{flex:1;overflow-y:auto;padding-bottom:8px}
.search-item{display:flex;align-items:center;gap:10px;padding:6px 16px;cursor:pointer;transition:background.15s}
.search-item:active{background:#1A1A1A}
.search-item .art{width:44px;height:44px;border-radius:4px;flex-shrink:0;object-fit:cover;background:#282828}
.search-item .info{flex:1;min-width:0}
.search-item .info .t{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-item .info .m{font-size:11px;color:#aaa;margin-top:1px}
.search-item .add{background:0;border:0;color:#555;font-size:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.search-item .add:active{background:rgba(29,185,84,.15);color:#1DB954}

.search-empty,.search-load{flex:1;display:flex;align-items:center;justify-content:center;color:#555;font-size:13px}
.search-load{display:none}

/* ── Queue ── */
.queue-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px;flex-shrink:0}
.queue-hdr h2{font-size:14px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px}
.queue-clear{background:0;border:0;color:#888;font-size:12px;cursor:pointer;padding:4px 8px;border-radius:4px}
.queue-clear:active{background:#1A1A1A}
.queue-list{flex:1;overflow-y:auto;padding-bottom:8px}
.queue-item{display:flex;align-items:center;gap:8px;padding:6px 16px;cursor:pointer;transition:background.15s}
.queue-item:active{background:#1A1A1A}
.queue-item.cur{background:#0E0E0E}
.queue-item .num{font-size:11px;color:#555;width:16px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
.queue-item .art{width:34px;height:34px;border-radius:4px;flex-shrink:0;object-fit:cover;background:#282828}
.queue-item .info{flex:1;min-width:0}
.queue-item .info .t{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.queue-item .info .m{font-size:10px;color:#888;margin-top:1px}
.queue-item .del{background:0;border:0;color:#333;font-size:12px;padding:6px;cursor:pointer}
.queue-item .del:active{color:#888}
.queue-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#555;font-size:13px}

/* ── Toast ── */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:#1DB954;color:#000;padding:8px 20px;border-radius:6px;font-size:12px;font-weight:600;opacity:0;transition:all.25s cubic-bezier(.16,1,.3,1);z-index:99;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

<div class="content">

<!-- Player -->
<div class="screen active" id="s-player">
<div class="player" id="player-root">
<div class="player-bg"><img id="bg-img" src=""></div>

<div id="player-empty" class="player-empty" style="display:flex">
  <div class="big-icon">♪</div>
  <h1>Nothing playing</h1>
  <p>Search for something to play</p>
  <button onclick="switchScreen('search')">Search</button>
</div>

<div id="player-active" style="display:none;flex-direction:column;height:100%">
  <div class="player-top">
    <button class="player-top-btn" onclick="switchScreen('search')">←</button>
    <span class="player-top-label">Now Playing</span>
    <button class="player-top-btn" onclick="toggleArtShape()" style="font-size:12px">⭑</button>
  </div>
  <div class="player-cover-wrap">
    <div class="player-cover round play" id="art-el">
      <img id="art-img" src="">
    </div>
  </div>
  <div class="player-body">
    <div class="track-info">
      <div class="track-title" id="p-title">-</div>
      <div class="track-artist" id="p-artist">-</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" onclick="seekBar(event)">
        <div class="progress-fill" id="seek-fill" style="width:0%"></div>
      </div>
      <div class="progress-time">
        <span id="p-curr">0:00</span>
        <span id="p-dur">-:--</span>
      </div>
    </div>
    <div class="ctrls">
      <button class="sml" id="s-btn" onclick="toggleShuffle()" style="letter-spacing:-2px">⇄</button>
      <button class="med" onclick="prevTrack()">⏮</button>
      <button class="big" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="med" onclick="nextTrack()">⏭</button>
      <button class="sml" id="l-btn" onclick="toggleLoop()">↺</button>
    </div>
    <div class="vol">
      <span id="v-icon">🔊</span>
      <input type="range" min="0" max="1" step="0.01" value="0.7" oninput="setV(+this.value)">
    </div>
  </div>
</div>
</div>
</div>

<!-- Search -->
<div class="screen" id="s-search">
<div class="search-header">
  <input id="search-input" placeholder="Search songs, artists..." autocomplete="off">
</div>
<div id="search-empty" class="search-empty">Search for music</div>
<div id="search-load" class="search-load">Searching...</div>
<div id="search-res" class="search-res" style="display:none"></div>
</div>

<!-- Queue -->
<div class="screen" id="s-queue">
<div class="queue-hdr">
  <h2>Queue</h2>
  <button class="queue-clear" id="q-clear" onclick="clearQ()">Clear</button>
</div>
<div id="q-list" class="queue-list"></div>
<div id="q-empty" class="queue-empty" style="display:none"><span style="font-size:32px;color:#1A1A1A">≡</span><span>Queue is empty</span></div>
</div>

</div>

<!-- Now Playing Bar -->
<div class="np-bar" id="np-bar" onclick="expandPlayer()">
<div class="np-bar-progress" id="np-progress" style="width:0%"></div>
<img class="np-cover" id="np-cover" src="">
<div class="np-info">
  <div class="np-title" id="np-title">-</div>
  <div class="np-artist" id="np-artist">-</div>
</div>
<div class="np-actions">
  <span class="np-icon" id="np-play" onclick="event.stopPropagation();togglePlay()">▶</span>
</div>
</div>

<!-- Nav -->
<div class="nav">
<button class="nav-btn active" data-s="player" onclick="switchScreen('player')">♩<span class="nav-label">Player</span></button>
<button class="nav-btn" data-s="search" onclick="switchScreen('search')">⌕<span class="nav-label">Search</span></button>
<button class="nav-btn" data-s="queue" onclick="switchScreen('queue')">≡<span class="nav-label">Queue</span></button>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API=''
let q=[],qi=-1,cur=null,play=false,vol=.7,lp='none',sf=false,loading=false,artRound=true
const a=new Audio();a.preload='auto'
const $=x=>document.getElementById(x)
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c])
const fmt=s=>s?Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'):'0:00'
// Toast
let tm
const toast=m=>{const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(tm);tm=setTimeout(()=>t.classList.remove('show'),1800)}

// Screen switching
function switchScreen(s){
  document.querySelectorAll('.screen').forEach(v=>v.classList.remove('active'))
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'))
  $(`s-${s}`).classList.add('active')
  document.querySelector(`.nav-btn[data-s="${s}"]`).classList.add('active')
  if(s==='search')setTimeout(()=>$('search-input').focus(),200)
  if(s!=='player'){if(artRound){artRound=false;$('art-el').classList.remove('round')}}else{artRound=true;$('art-el').classList.add('round')}
}
function expandPlayer(){switchScreen('player')}

// Toggle art shape
function toggleArtShape(){artRound=!artRound;$('art-el').classList.toggle('round',artRound);toast(artRound?'Vinyl mode':'Square mode')}

// Search
let st
$('search-input').addEventListener('input',e=>{clearTimeout(st);const q=e.target.value.trim();if(q.length<3){$('search-res').style.display='none';$('search-empty').style.display='flex';return}st=setTimeout(()=>doSearch(q),300)})
$('search-input').addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(st);doSearch(e.target.value.trim())}})
async function doSearch(q){
  $('search-empty').style.display='none';$('search-load').style.display='flex';$('search-load').textContent='Searching...';$('search-res').style.display='none'
  try{const r=await fetch(API+'/api/search?q='+encodeURIComponent(q));const d=await r.json();renderRes(d)}catch{$('search-load').textContent='Failed'}
}
function renderRes(r){
  $('search-load').style.display='none'
  if(!r.length){$('search-load').textContent='No results';$('search-load').style.display='flex';return}
  $('search-res').style.display='block'
  $('search-res').innerHTML=r.map((t,i)=>`<div class="search-item">
    <img class="art" src="${esc(t.thumbnail)}" onerror="this.src='/apple-icon.png'">
    <div class="info"><div class="t">${esc(t.title)}</div><div class="m">${esc(t.channel)} · ${fmt(t.duration)}</div></div>
    <button class="add">+</button></div>`).join('')
  $('search-res').querySelectorAll('.search-item').forEach((el,i)=>{
    el.querySelector('.add').onclick=e=>{e.stopPropagation();addQ(r[i]);toast('Added to queue')}
    el.onclick=()=>play(r[i],q.length)
  })
}

// Queue
function addQ(t){q.push(t);if(q.length===1&&!cur){play(t,0);return}renderQ()}
function renderQ(){
  const list=$('q-list'),e=$('q-empty');$('q-clear').style.display=q.length?'block':'none'
  if(!q.length){list.innerHTML='';e.style.display='flex';return}
  e.style.display='none'
  list.innerHTML=q.map((t,i)=>`<div class="queue-item${i===qi?' cur':''}">
    <span class="num">${i+1}</span>
    <img class="art" src="${esc(t.thumbnail)}" onerror="this.src='/apple-icon.png'">
    <div class="info"><div class="t">${esc(t.title)}</div><div class="m">${esc(t.channel)}</div></div>
    <button class="del" onclick="event.stopPropagation();delQ(${i})">✕</button></div>`).join('')
  list.querySelectorAll('.queue-item').forEach((el,i)=>{el.onclick=()=>{if(i!==qi||!cur)play(q[i],i)}})
}
function delQ(i){q.splice(i,1);if(i<qi)qi--;else if(i===qi){qi=-1;cur=null;upd();$('q-clear').style.display='none'}renderQ()}
function clearQ(){q=[];qi=-1;cur=null;a.pause();a.removeAttribute('src');a.load();play=false;loading=false;upd();renderQ();toast('Cleared')}

// Controls
function toggleShuffle(){sf=!sf;$('s-btn').classList.toggle('on',sf);toast(sf?'Shuffle on':'Shuffle off')}
function toggleLoop(){const m=['none','all','one'];lp=m[(m.indexOf(lp)+1)%m.length];$('l-btn').classList.toggle('on',lp!=='none');toast(lp==='none'?'Loop off':lp==='all'?'Loop all':'Loop one')}
function setV(v){vol=v;a.volume=v;$('v-icon').textContent=v===0?'🔇':v<.5?'🔉':'🔊'}
setV(.7)

// Player
function play(t,idx){
  if(idx!==undefined&&idx>=0)qi=idx
  else if(!q.length||q[q.length-1].id!==t.id){q.push(t);qi=q.length-1}
  else qi=q.indexOf(t)
  cur=t;loading=false;renderQ();upd();stream(t.id)
}
function upd(){
  if(!cur){$('player-empty').style.display='flex';$('player-active').style.display='none';$('np-bar').classList.remove('active');return}
  $('player-empty').style.display='none';$('player-active').style.display='flex';$('np-bar').classList.add('active')
  const img=cur.thumbnail||''
  $('art-img').src=img;$('bg-img').src=img;$('bg-img').className=img?'show':''
  $('p-title').textContent=cur.title;$('p-artist').textContent=cur.channel
  $('np-cover').src=img;$('np-title').textContent=cur.title;$('np-artist').textContent=cur.channel
  updMediaSession()
}
function stream(id){
  loading=true;$('play-btn').textContent='⏳';play=false
  if('mediaSession'in navigator)navigator.mediaSession.playbackState='none'
  a.pause();a.removeAttribute('src');a.load()
  a.src=API+'/api/stream/'+id;a.load()
  let fired=false
  a.addEventListener('canplay',function cp(){a.removeEventListener('canplay',cp);fired=true;if(!loading)return;loading=false;doPlay()},{once:true})
  a.addEventListener('error',function er(){a.removeEventListener('error',er);if(!loading)return;loading=false;$('play-btn').textContent='▶';toast('Error, skipping...');setTimeout(nxt,1500)},{once:true})
  setTimeout(()=>{if(loading&&!fired){loading=false;$('play-btn').textContent='▶';toast('Timeout');setTimeout(nxt,1500)}},35000)
}
function doPlay(){
  a.play().catch(()=>setTimeout(()=>a.play().catch(()=>{if(!loading)return;loading=false;$('play-btn').textContent='▶';toast('Play failed');setTimeout(nxt,1500)}),500))
  play=true;$('play-btn').innerHTML='⏸';$('np-play').textContent='⏸'
}
function togglePlay(){
  if(!cur)return
  if(play){a.pause();$('play-btn').innerHTML='▶';$('np-play').textContent='▶';if('mediaSession'in navigator)navigator.mediaSession.playbackState='paused'}
  else{a.play().catch(()=>{});$('play-btn').innerHTML='⏸';$('np-play').textContent='⏸';if('mediaSession'in navigator)navigator.mediaSession.playbackState='playing'}
  play=!play
}
function nxt(){
  if(!q.length)return;loading=false;a.pause()
  if(lp==='one'){a.currentTime=0;doPlay();return}
  const ni=sf?Math.floor(Math.random()*q.length):qi<q.length-1?qi+1:0
  play(q[ni],ni)
}
function prv(){if(!q.length||qi<=0)return;loading=false;a.pause();play(q[qi-1],qi-1)}
function seekBar(e){const r=e.currentTarget.getBoundingClientRect();const p=(e.clientX-r.left)/r.width;if(a.duration)a.currentTime=p*a.duration}

// Media Session
function updMediaSession(){
  if(!('mediaSession'in navigator)||!cur)return
  navigator.mediaSession.metadata=new MediaMetadata({title:cur.title,artist:cur.channel,album:'',artwork:[{src:cur.thumbnail||'/apple-icon.png',sizes:'512x512',type:'image/png'}]})
  navigator.mediaSession.playbackState=play?'playing':'paused'
  navigator.mediaSession.setActionHandler('play',()=>togglePlay())
  navigator.mediaSession.setActionHandler('pause',()=>togglePlay())
  navigator.mediaSession.setActionHandler('nexttrack',()=>nxt())
  navigator.mediaSession.setActionHandler('previoustrack',()=>prv())
  navigator.mediaSession.setActionHandler('seekto',d=>{if(a.duration&&d.seekTime)a.currentTime=d.seekTime})
}

// Audio events
a.addEventListener('timeupdate',()=>{
  if(!a.duration)return
  const p=a.currentTime/a.duration*100
  $('seek-fill').style.width=p+'%';$('np-progress').style.width=p+'%'
  $('p-curr').textContent=fmt(a.currentTime);$('p-dur').textContent=fmt(a.duration)
  if('mediaSession'in navigator){try{navigator.mediaSession.setPositionState({duration:a.duration,playbackRate:1,position:a.currentTime})}catch{}}
})
a.addEventListener('ended',()=>{if(lp==='one'){a.currentTime=0;a.play().catch(()=>{});return}play=false;nxt()})
a.addEventListener('loadedmetadata',()=>{$('p-dur').textContent=fmt(a.duration)})
a.addEventListener('error',()=>{$('play-btn').innerHTML='▶';$('np-play').textContent='▶';play=false})

renderQ()
toast('♩ Nyu\'rka')
</script>
