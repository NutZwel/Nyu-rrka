<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<title>Nyu'rka</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#app{height:100%;background:#0A0A0A;color:#F5F5F5;font-family:-apple-system,system-ui,sans-serif;overflow:hidden}
input{font-family:inherit}
input[type=range]{-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#666;border:2px solid #F5F5F5}

.tabbar{display:flex;background:#0A0A0A;border-top:1px solid #141414;padding:6px 0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:0;border:0;color:#333;font-size:18px;padding:4px}
.tab.active{color:#F5F5F5}
.tab-label{font-size:8px;letter-spacing:1px;text-transform:uppercase}

.search-input{background:#141414;color:#F5F5F5;border:0;border-radius:12px;padding:12px 16px;font-size:15px;outline:none;width:100%}
.search-input::placeholder{color:#555}

.result-item{display:flex;align-items:center;gap:12px;padding:10px 16px}
.result-cover{width:48px;height:48px;border-radius:8px;background:#141414;flex-shrink:0;object-fit:cover}
.result-info{flex:1;min-width:0}
.result-title{font-size:14px;font-weight:500;color:#F5F5F5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-meta{font-size:12px;color:#666;margin-top:2px}
.result-add{background:0;border:0;color:#555;font-size:18px;padding:8px}

.player{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px}
.player-cover{width:220px;height:220px;border-radius:50%;overflow:hidden;background:#111;margin-bottom:24px;box-shadow:0 8px 32px rgba(255,255,255,0.05)}
.player-cover img{width:100%;height:100%;object-fit:cover}
.player-info{text-align:center;margin-bottom:20px;width:100%;max-width:280px}
.player-title{font-size:18px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-artist{font-size:14px;color:#666;margin-top:4px}
.player-progress{width:100%;max-width:280px;display:flex;flex-direction:column;gap:4px;margin-bottom:20px}
.player-time{display:flex;justify-content:space-between;font-size:11px;color:#555;font-variant-numeric:tabular-nums}
.player-controls{display:flex;align-items:center;gap:24px;margin-bottom:20px}
.player-btn{background:0;border:0;color:#666;font-size:22px;padding:8px}
.player-play{width:56px;height:56px;border-radius:50%;border:1px solid #222;display:flex;align-items:center;justify-content:center;font-size:24px;color:#F5F5F5;background:0}
.player-volume{display:flex;align-items:center;gap:8px;width:100%;max-width:180px;color:#555;font-size:12px}

.queue-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #111}
.queue-active{background:#141414}
.queue-info{flex:1;min-width:0}
.queue-title{font-size:13px;color:#F5F5F5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.queue-meta{font-size:11px;color:#555;margin-top:1px}
.queue-remove{background:0;border:0;color:#333;font-size:16px;padding:8px}
.queue-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:#555;font-size:14px}

.nowplaying{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#141414;border-radius:10px;margin:4px 12px;cursor:pointer;flex-shrink:0}
.nowplaying-cover{width:36px;height:36px;border-radius:6px;background:#1A1A1A;flex-shrink:0;object-fit:cover}
.nowplaying-info{flex:1;min-width:0}
.nowplaying-title{font-size:12px;color:#F5F5F5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nowplaying-artist{font-size:10px;color:#555}
.nowplaying-icon{color:#555;font-size:14px;flex-shrink:0}

.view{display:none;flex-direction:column;flex:1;overflow-y:auto}
.view.active{display:flex}
</style>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;height:100%">
  <!-- Views -->
  <div id="view-player" class="view active">
    <div class="player" id="player-empty">
      <div style="width:120px;height:120px;border-radius:50%;background:#141414;display:flex;align-items:center;justify-content:center;font-size:40px;color:#333;margin-bottom:16px">♪</div>
      <div style="color:#555;font-size:14px;font-weight:500">Nothing Playing</div>
      <button onclick="switchTab('search')" style="margin-top:16px;padding:10px 24px;border-radius:12px;border:1px solid #333;background:0;color:#666;font-size:13px;cursor:pointer">Find Music</button>
    </div>
    <div class="player" id="player-active" style="display:none">
      <div class="player-cover"><img id="player-cover" src="" alt=""></div>
      <div class="player-info">
        <div class="player-title" id="player-title"></div>
        <div class="player-artist" id="player-artist"></div>
      </div>
      <div class="player-progress">
        <input type="range" id="player-seek" min="0" max="1" step="0.001" value="0" oninput="seek(this.value)">
        <div class="player-time">
          <span id="player-current">0:00</span>
          <span id="player-duration">0:00</span>
        </div>
      </div>
      <div class="player-controls">
        <button class="player-btn" onclick="prevTrack()">⏮</button>
        <button class="player-play" id="player-play-btn" onclick="togglePlay()">▶</button>
        <button class="player-btn" onclick="nextTrack()">⏭</button>
      </div>
      <div class="player-volume">
        <span id="vol-icon">🔊</span>
        <input type="range" min="0" max="1" step="0.01" value="0.7" oninput="setVolume(this.value)" style="flex:1">
      </div>
    </div>
    <div id="nowplaying" class="nowplaying" style="display:none" onclick="switchTab('player')">
      <img id="np-cover" class="nowplaying-cover" src="">
      <div class="nowplaying-info">
        <div class="nowplaying-title" id="np-title"></div>
        <div class="nowplaying-artist" id="np-artist"></div>
      </div>
      <div class="nowplaying-icon">▶</div>
    </div>
  </div>

  <div id="view-search" class="view">
    <div style="padding:12px 16px;flex-shrink:0">
      <input class="search-input" id="search-input" placeholder="Search songs..." autocomplete="off">
    </div>
    <div id="search-empty" style="flex:1;display:flex;align-items:center;justify-content:center;color:#555;font-size:14px">Search for songs</div>
    <div id="search-loading" style="flex:1;display:none;align-items:center;justify-content:center;color:#555">Searching...</div>
    <div id="search-results" style="flex:1;overflow-y:auto;display:none"></div>
  </div>

  <div id="view-queue" class="view">
    <div id="queue-list" style="flex:1;overflow-y:auto"></div>
    <div id="queue-empty" class="queue-empty" style="display:none">
      <span style="font-size:32px;color:#222">≡</span>
      <span>Queue is empty</span>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tabbar">
    <button class="tab active" data-tab="player" onclick="switchTab('player')">
      ♩<span class="tab-label">Player</span>
    </button>
    <button class="tab" data-tab="search" onclick="switchTab('search')">
      ⌕<span class="tab-label">Search</span>
    </button>
    <button class="tab" data-tab="queue" onclick="switchTab('queue')">
      ≡<span class="tab-label">Queue</span>
    </button>
  </div>
</div>

<script>
const API = ''
let queue = []
let qIdx = -1
let currentTrack = null
let audio = new Audio()
audio.preload = 'auto'
let isPlaying = false
let volume = 0.7

const fmt = s => s ? Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0') : '0:00'
const $ = id => document.getElementById(id)

// ── Tab ──
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.getElementById('view-'+tab).classList.add('active')
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active')
  if (tab === 'search') $('search-input').focus()
}

// ── Search ──
let searchTimer
$('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer)
  const q = e.target.value.trim()
  if (q.length < 3) { $('search-results').style.display='none'; $('search-empty').style.display='flex'; return }
  searchTimer = setTimeout(() => doSearch(q), 500)
})
$('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { clearTimeout(searchTimer); doSearch(e.target.value.trim()) }
})

async function doSearch(q) {
  $('search-empty').style.display='none'
  $('search-loading').style.display='flex'
  $('search-results').style.display='none'
  try {
    const r = await fetch(API+'/api/search?q='+encodeURIComponent(q))
    if (!r.ok) throw Error('fail')
    const results = await r.json()
    renderResults(results)
  } catch { $('search-loading').textContent='Search failed' }
}

function renderResults(results) {
  $('search-loading').style.display='none'
  if (!results.length) { $('search-loading').textContent='No results'; $('search-loading').style.display='flex'; return }
  $('search-results').style.display='block'
  $('search-results').innerHTML = results.map(t => `
    <div class="result-item">
      <img class="result-cover" src="${t.thumbnail}" loading="lazy" onerror="this.src='/apple-icon.png'">
      <div class="result-info">
        <div class="result-title">${esc(t.title)}</div>
        <div class="result-meta">${esc(t.channel)} · ${fmt(t.duration)}</div>
      </div>
      <button class="result-add" onclick="event.stopPropagation();addToQueue(${JSON.stringify(t).replace(/"/g,'&quot;')})">+</button>
    </div>
  `).join('')
  // Click to play
  $('search-results').querySelectorAll('.result-item').forEach((el, i) => {
    el.addEventListener('click', () => playTrack(results[i]))
  })
}

function esc(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]) }

// ── Queue ──
function addToQueue(t) {
  queue.push(t)
  if (queue.length === 1 && !currentTrack) playTrack(t, 0)
  renderQueue()
}

function renderQueue() {
  const el = $('queue-list')
  const empty = $('queue-empty')
  if (!queue.length) { el.innerHTML=''; empty.style.display='flex'; return }
  empty.style.display='none'
  el.innerHTML = queue.map((t, i) => `
    <div class="queue-item${i===qIdx?' queue-active':''}">
      <div class="queue-info">
        <div class="queue-title">${esc(t.title)}</div>
        <div class="queue-meta">${esc(t.channel)} · ${fmt(t.duration)}</div>
      </div>
      <button class="queue-remove" onclick="removeFromQueue(${i})">✕</button>
    </div>
  `).join('')
  el.querySelectorAll('.queue-item').forEach((item, i) => {
    item.addEventListener('click', e => { if (e.target.tagName !== 'BUTTON') playTrack(queue[i], i) })
  })
}

function removeFromQueue(i) {
  queue.splice(i, 1)
  if (i < qIdx) qIdx--
  else if (i === qIdx) { qIdx = -1; currentTrack = null; updatePlayer() }
  renderQueue()
}

// ── Player ──
function playTrack(t, idx) {
  if (idx !== undefined) qIdx = idx
  else if (!queue.length || queue[queue.length-1].id !== t.id) { queue.push(t); qIdx = queue.length-1 }
  else qIdx = queue.indexOf(t)
  currentTrack = t
  renderQueue()
  updatePlayer()
  startStream(t.id)
}

function updatePlayer() {
  if (!currentTrack) {
    $('player-empty').style.display='flex'
    $('player-active').style.display='none'
    $('nowplaying').style.display='none'
    return
  }
  $('player-empty').style.display='none'
  $('player-active').style.display='flex'
  $('nowplaying').style.display='flex'
  $('player-cover').src = currentTrack.thumbnail || ''
  $('player-title').textContent = currentTrack.title
  $('player-artist').textContent = currentTrack.channel
  $('np-cover').src = currentTrack.thumbnail || ''
  $('np-title').textContent = currentTrack.title
  $('np-artist').textContent = currentTrack.channel
}

async function startStream(videoId) {
  try {
    $('player-play-btn').textContent = '⏳'
    audio.src = API + '/api/stream/' + videoId
    audio.load()
    await audio.play()
    isPlaying = true
    $('player-play-btn').textContent = '⏸'
  } catch(e) {
    console.error('Play failed:', e)
    $('player-play-btn').textContent = '▶'
  }
}

function togglePlay() {
  if (!currentTrack) return
  if (isPlaying) { audio.pause(); $('player-play-btn').textContent='▶' }
  else { audio.play().catch(()=>{}); $('player-play-btn').textContent='⏸' }
  isPlaying = !isPlaying
}

function nextTrack() {
  if (queue.length && qIdx < queue.length-1) playTrack(queue[qIdx+1], qIdx+1)
  else if (queue.length) playTrack(queue[0], 0)
}

function prevTrack() {
  if (queue.length && qIdx > 0) playTrack(queue[qIdx-1], qIdx-1)
}

function seek(val) {
  if (audio.duration) audio.currentTime = val * audio.duration
}

function setVolume(val) {
  volume = val
  audio.volume = val
  $('vol-icon').textContent = val === 0 ? '🔇' : val < 0.5 ? '🔉' : '🔊'
}

// ── Audio events ──
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return
  $('player-current').textContent = fmt(audio.currentTime)
  $('player-duration').textContent = fmt(audio.duration)
  $('player-seek').value = audio.currentTime / audio.duration
})

audio.addEventListener('ended', nextTrack)

audio.addEventListener('loadedmetadata', () => {
  $('player-duration').textContent = fmt(audio.duration)
})

audio.addEventListener('canplay', () => {
  audio.play().catch(()=>{})
  isPlaying=true
  $('player-play-btn').textContent='⏸'
})

audio.addEventListener('error', (e) => {
  console.error('Audio error:', audio.error?.code)
  $('player-play-btn').textContent='▶'
  isPlaying=false
})

// Init
audio.volume = volume
setVolume(volume)
</script>
</body>
</html>
