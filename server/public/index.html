<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<title>Nyu'rka</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0A0A0A;color:#fff;font-family:-apple-system,system-ui,Helvetica,sans-serif;overflow:hidden}
::-webkit-scrollbar{display:none}
input{font-family:inherit}

.app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;background:#0A0A0A}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 6px;flex-shrink:0}
.hdr-l{font-size:20px;font-weight:800;letter-spacing:-.5px}
.hdr-l span{color:#1DB954}
.hdr-r{width:32px;height:32px;border-radius:50%;background:#181818;border:0;color:#666;cursor:pointer;font-size:14px}

/* Search */
.srch{margin:6px 20px 14px;position:relative}
.srch input{width:100%;background:#181818;border:0;border-radius:12px;color:#fff;font-size:15px;padding:13px 16px 13px 38px;outline:none}
.srch input::placeholder{color:#444}
.srch input:focus{background:#202020}
.srch-i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#444;font-size:15px;pointer-events:none}

/* Section */
.sec{margin-bottom:16px}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:8px}
.sec-title{font-size:17px;font-weight:700;letter-spacing:-.3px}

/* Horizontal scroll */
.hs{display:flex;gap:14px;overflow-x:auto;padding:0 20px;-webkit-overflow-scrolling:touch}
.hs::-webkit-scrollbar{display:none}
.hs-it{flex-shrink:0;scroll-snap-align:start;cursor:pointer;width:150px}
.hs-it:active{opacity:.7}
.hs-it .art{width:150px;height:150px;border-radius:16px;overflow:hidden;background:#181818;margin-bottom:8px;position:relative}
.hs-it .art img{width:100%;height:100%;object-fit:cover}
.hs-it .art .ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.4),transparent 50%)}
.hs-it .art .pl{position:absolute;bottom:10px;right:10px;width:36px;height:36px;border-radius:50%;background:#1DB954;display:flex;align-items:center;justify-content:center;color:#000;font-size:14px;opacity:0;transform:translateY(6px);transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.hs-it:active .art .pl{opacity:1;transform:translateY(0)}
.hs-it .nm{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.hs-it .sub{font-size:11px;color:#888;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}

/* Row */
.row{display:flex;align-items:center;gap:10px;padding:7px 20px;cursor:pointer;transition:background .15s}
.row:active{background:#141414}
.row .art{width:44px;height:44px;border-radius:8px;flex-shrink:0;object-fit:cover;background:#181818}
.row .inf{flex:1;min-width:0}
.row .inf .t{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .inf .m{font-size:11px;color:#888;margin-top:2px}
.row .act{background:0;border:0;color:#555;font-size:14px;padding:8px;cursor:pointer}

/* Now Playing Bar */
.npb{display:none;align-items:center;gap:10px;margin:0 10px;padding:8px 10px;background:#141414;border-radius:12px;cursor:pointer;flex-shrink:0;position:relative;overflow:hidden}
.npb.active{display:flex}
.npb .bar{position:absolute;bottom:0;left:0;height:2px;background:#1DB954;transition:width .2s;border-radius:0 2px 0 0}
.npb .art{width:38px;height:38px;border-radius:6px;flex-shrink:0;object-fit:cover;background:#181818}
.npb .inf{flex:1;min-width:0}
.npb .inf .t{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.npb .inf .a{font-size:10px;color:#888;margin-top:1px}
.npb .pl{width:32px;height:32px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;color:#000;flex-shrink:0;cursor:pointer;border:0;font-size:13px}

/* Nav */
.nav{display:flex;background:#0A0A0A;border-top:1px solid #141414;flex-shrink:0;padding:4px 0 calc(4px + env(safe-area-inset-bottom))}
.nav-b{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:0;border:0;color:#444;cursor:pointer;padding:4px;transition:color .15s;font-size:18px}
.nav-b.active{color:#fff}
.nav-b .lbl{font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:2px}

/* Player Overlay */
.ps{position:fixed;inset:0;max-width:480px;margin:0 auto;background:#0A0A0A;z-index:100;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1)}
.ps.open{transform:translateY(0)}
.ps .ph{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;flex-shrink:0}
.ps .ph button{background:0;border:0;color:rgba(255,255,255,.5);padding:10px;cursor:pointer;font-size:16px}
.ps .ph .lb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4)}
.ps .pcv{flex:1;display:flex;align-items:center;justify-content:center;padding:0 24px;min-height:0}
.ps .pcv img{width:100%;max-width:340px;aspect-ratio:1;object-fit:cover;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.5);background:#181818}
.ps .pb{flex-shrink:0;padding:4px 24px 20px}
.ps .pb .info{margin-bottom:4px}
.ps .pb .info .ti{font-size:18px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ps .pb .info .ar{font-size:13px;color:#aaa;margin-top:1px}
.ps .pb .pr{margin-bottom:2px}
.ps .pb .pr .bar{width:100%;height:3px;background:rgba(255,255,255,.08);border-radius:2px;cursor:pointer;position:relative}
.ps .pb .pr .fill{height:100%;background:#fff;border-radius:2px;width:0;transition:width .1s}
.ps .pb .tm{display:flex;justify-content:space-between;font-size:10px;color:#666;margin-top:4px;font-variant-numeric:tabular-nums}
.ps .pb .ctrl{display:flex;align-items:center;justify-content:center;gap:28px;padding:8px 0}
.ps .pb .ctrl button{background:0;border:0;cursor:pointer;padding:6px;color:rgba(255,255,255,.5);font-size:20px;display:flex;align-items:center;justify-content:center}
.ps .pb .ctrl button.on{color:#1DB954}
.ps .pb .ctrl .big{width:56px;height:56px;border-radius:50%;background:#fff;color:#000;font-size:24px}
.ps .pb .ctrl .big:active{transform:scale(.92)}

/* Queue */
.qs{position:fixed;inset:0;max-width:480px;margin:0 auto;background:#0A0A0A;z-index:100;display:none;flex-direction:column}
.qs.open{display:flex}
.qs .qh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;flex-shrink:0}
.qs .qh button{background:0;border:0;cursor:pointer;padding:6px;color:#888;font-size:16px}
.qs .qh .tl{font-size:15px;font-weight:700}
.qs .qh .cr{color:#1DB954;font-size:13px}
.qs .ql{flex:1;overflow-y:auto;padding-bottom:8px}
.qs .qe{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#555;font-size:13px}

/* Search results */
.sr{flex:1;overflow-y:auto}
.sr .it{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;transition:background .15s}
.sr .it:active{background:#141414}
.sr .it .art{width:44px;height:44px;border-radius:8px;flex-shrink:0;object-fit:cover;background:#181818}
.sr .it .inf{flex:1;min-width:0}
.sr .it .inf .t{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr .it .inf .m{font-size:11px;color:#888;margin-top:1px}
.sr .it .add{background:0;border:0;color:#1DB954;font-size:18px;padding:8px;cursor:pointer}
.sr .it .add:active{background:rgba(29,185,84,.12);border-radius:8px}
.sr-m{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#555;font-size:13px;gap:8px;padding:20px}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1DB954;color:#000;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Empty */
.emp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 20px;text-align:center}
.emp .big{font-size:60px;opacity:.15}
.emp h2{font-size:18px;font-weight:700;color:#888;letter-spacing:-.3px}
.emp p{font-size:12px;color:#555;line-height:1.5}
</style>
</head>
<body>
<div class="app">

<!-- Main Screen -->
<div class="scr" id="main-scr">
  <div class="hdr">
    <div class="hdr-l">♫ Nyu<span>'rka</span></div>
    <button class="hdr-r" onclick="toast('Settings coming soon')">⚙</button>
  </div>
  <div class="srch">
    <span class="srch-i">⌕</span>
    <input id="si" placeholder="What do you want to play?" autocomplete="off">
  </div>

  <div id="home">
    <div class="sec" id="sec-rec" style="display:none">
      <div class="sec-h"><span class="sec-title">Recommended</span></div>
      <div class="hs" id="rec-hs"></div>
    </div>
    <div class="sec" id="sec-recent" style="display:none">
      <div class="sec-h"><span class="sec-title">Recently Played</span></div>
      <div id="recent-list"></div>
    </div>
    <div class="emp">
      <div class="big">♫</div>
      <h2>Discover Music</h2>
      <p>Search for your favorite songs<br>and they'll appear here</p>
    </div>
  </div>

  <div id="sr" class="sr" style="display:none"></div>
  <div id="sr-m" class="sr-m" style="display:none">⌕<span>Search for music</span></div>
</div>

<!-- Now Playing Bar -->
<div class="npb" id="npb" onclick="openPlayer()">
  <div class="bar" id="np-bar-fill" style="width:0%"></div>
  <img class="art" id="np-art" src="">
  <div class="inf">
    <div class="t" id="np-t">-</div>
    <div class="a" id="np-a">-</div>
  </div>
  <button class="pl" id="np-play" onclick="event.stopPropagation();togglePlay()">▶</button>
</div>

<!-- Nav -->
<div class="nav">
  <button class="nav-b active" onclick="switchTab('home')">♩<span class="lbl">Home</span></button>
  <button class="nav-b" onclick="switchTab('search')">⌕<span class="lbl">Search</span></button>
  <button class="nav-b" onclick="switchTab('queue')">≡<span class="lbl">Queue</span></button>
</div>

<!-- Player Overlay -->
<div class="ps" id="ps">
  <div class="ph">
    <button onclick="closePlayer()">▼</button>
    <span class="lb">Now Playing</span>
    <button style="opacity:0">·</button>
  </div>
  <div class="pcv"><img id="p-img" src=""></div>
  <div class="pb">
    <div class="info">
      <div class="ti" id="p-t">-</div>
      <div class="ar" id="p-ar">-</div>
    </div>
    <div class="pr">
      <div class="bar" onclick="seekTo(event)"><div class="fill" id="p-fill" style="width:0%"></div></div>
      <div class="tm"><span id="p-curr">0:00</span><span id="p-dur">-:--</span></div>
    </div>
    <div class="ctrl">
      <button class="on" id="sf-btn" onclick="toggleShuffle()">⇄</button>
      <button onclick="prevBtn()">⏮</button>
      <button class="big" id="play-btn" onclick="togglePlay()">▶</button>
      <button onclick="nextBtn()">⏭</button>
      <button id="lp-btn" onclick="toggleLoop()">↺</button>
    </div>
  </div>
</div>

<!-- Queue Overlay -->
<div class="qs" id="qs">
  <div class="qh">
    <button onclick="closeQueue()">✕</button>
    <span class="tl">Queue</span>
    <button class="cr" onclick="clearQ()">Clear</button>
  </div>
  <div id="q-list" class="ql"></div>
  <div id="q-empty" class="qe"><span style="font-size:36px;color:#181818">≡</span>Your queue is empty</div>
</div>

<div class="toast" id="toast"></div>
<script>

const API=''
let q=[],qi=-1,cur=null,playing=false,vol=.7,lp='none',sf=false,loading=false
const a=new Audio();a.preload='auto'
const $=x=>document.getElementById(x)
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c])
const fmt=s=>s?Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'):'0:00'
let recent=JSON.parse(localStorage.getItem('nrk_recent')||'[]')

let tmr
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(tmr);tmr=setTimeout(()=>t.classList.remove('show'),2000)}

// ── Cleanup audio listeners ──
let audioListenersInitialized = false
function initAudioListeners() {
  if (audioListenersInitialized) return
  audioListenersInitialized = true

  a.addEventListener('timeupdate', () => {
    if (!a.duration) return
    const p = a.currentTime / a.duration * 100
    $('p-fill').style.width = p + '%'
    $('np-bar-fill').style.width = p + '%'
    $('p-curr').textContent = fmt(a.currentTime)
    $('p-dur').textContent = fmt(a.duration)
    // Background playback: detek kalo lagu abis (hanya kalo duration valid & > 3 detik)
    if (playing && a.duration > 3 && a.duration - a.currentTime < 0.5) {
      playing = false
      if (lp === 'one') { a.currentTime = 0; a.play().catch(()=>{}); return }
      nxt()
    }
  })

  a.addEventListener('ended', () => {
    if (lp === 'one') { a.currentTime = 0; a.play().catch(()=>{}); return }
    playing = false
    nxt()
  })

  a.addEventListener('loadedmetadata', () => {
    $('p-dur').textContent = fmt(a.duration)
  })

  a.addEventListener('error', () => {
    $('play-btn').textContent = '▶'
    $('np-play').textContent = '▶'
    playing = false
  })
}
initAudioListeners()

// ── Tab switching ──
function switchTab(t){
  document.querySelectorAll('.nav-b').forEach(b=>b.classList.remove('active'))
  const idx=t==='home'?0:t==='search'?1:2
  document.querySelectorAll('.nav-b')[idx].classList.add('active')
  if(t==='home')showHome()
  else if(t==='search')showSearch()
  else showQueue()
}
function showHome(){
  $('home').style.display='block';$('sr').style.display='none';$('sr-m').style.display='none';$('si').value='';$('si').blur()
}
function showSearch(){
  $('home').style.display='none';$('sr').style.display='none';$('sr-m').style.display='flex';$('sr-m').innerHTML='⌕<span>Search for music</span>'
  setTimeout(()=>$('si').focus(),200)
}
function showQueue(){openQueue()}
function openPlayer(){$('ps').classList.add('open')}
function closePlayer(){$('ps').classList.remove('open')}
function openQueue(){$('qs').classList.add('open');renderQ();$('sr-m').style.display='none';$('sr').style.display='none'}
function closeQueue(){$('qs').classList.remove('open')}

// ── Search ──
let st
$('si').addEventListener('input',e=>{
  clearTimeout(st)
  const v=e.target.value.trim()
  if(v.length<3){$('home').style.display='none';$('sr').style.display='none';$('sr-m').style.display='flex';$('sr-m').innerHTML='⌕<span>Type at least 3 characters</span>';return}
  st=setTimeout(()=>doSearch(v),300)
})
$('si').addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(st);doSearch(e.target.value.trim())}})

async function doSearch(s){
  $('sr').style.display='none';$('sr-m').style.display='flex';$('sr-m').innerHTML='⌕<span>Searching...</span>'
  try{const r=await fetch(API+'/api/search?q='+encodeURIComponent(s));const d=await r.json();renderSearch(d)}
  catch{$('sr-m').innerHTML='<span>Search failed</span>'}
}
function renderSearch(r){
  if(!r.length){$('sr-m').style.display='flex';$('sr-m').innerHTML='<span>No results</span>';$('sr').style.display='none';return}
  $('sr-m').style.display='none';$('sr').style.display='block'
  $('sr').innerHTML=r.map((t,i)=>`<div class="it" onclick="addAndPlay(${i})">
    <img class="art" src="${esc(t.thumbnail)}" onerror="this.src='/apple-icon.png'">
    <div class="inf"><div class="t">${esc(t.title)}</div><div class="m">${esc(t.channel)} · ${fmt(t.duration)}</div></div>
    <button class="add" onclick="event.stopPropagation();justAdd(${i});toast('Added to queue')">+</button></div>`).join('')
  window._ls=r
}
function justAdd(i){const t=window._ls[i];q.push(t);if(q.length===1&&!cur)playAt(q.length-1);renderQ()}
function addAndPlay(i){const t=window._ls[i];q.push(t);playAt(q.length-1)}

// ── Queue ──
function renderQ(){
  const list=$('q-list')
  if(!q.length){list.innerHTML='';$('q-empty').style.display='flex';return}
  $('q-empty').style.display='none'
  list.innerHTML=q.map((t,i)=>`<div class="row" onclick="playAt(${i})" style="${i===qi?'background:#141414':''}">
    <img class="art" src="${esc(t.thumbnail)}" onerror="this.src='/apple-icon.png'">
    <div class="inf"><div class="t"${i===qi?' style="color:#1DB954"':''}>${esc(t.title)}</div><div class="m">${esc(t.channel)}</div></div>
    <button class="act" onclick="event.stopPropagation();delQ(${i})">✕</button></div>`).join('')
}
function delQ(i){q.splice(i,1);if(i<qi)qi--;else if(i===qi){qi=-1;cur=null;updP();$('npb').classList.remove('active')}renderQ()}
function clearQ(){q=[];qi=-1;cur=null;a.pause();a.removeAttribute('src');a.load();playing=false;loading=false;updP();renderQ();closeQueue();toast('Queue cleared')}

// ── Player ──
let _recLock=false

function playAt(idx){
  if(idx<0||idx>=q.length)return
  qi=idx;cur=q[qi];loading=false
  updP();stream(cur.id);saveRecent(cur)
  // Load recommendations untuk Home section
  loadRecs()
  openPlayer()
  // Activate Home tab
  document.querySelectorAll('.nav-b')[0].classList.add('active')
  document.querySelectorAll('.nav-b')[1].classList.remove('active')
  document.querySelectorAll('.nav-b')[2].classList.remove('active')
}
function updP(){
  if(!cur){$('npb').classList.remove('active');$('play-btn').textContent='▶';return}
  const img=cur.thumbnail||''
  $('npb').classList.add('active')
  $('np-art').src=img;$('np-t').textContent=cur.title;$('np-a').textContent=cur.channel
  $('p-img').src=img;$('p-t').textContent=cur.title;$('p-ar').textContent=cur.channel
  updMediaSession()
}

// ── Stream management ──
// Hanya pake 1x canplay + error listener per stream (dibersihin tiap stream baru)
let _streamCancelled = false

function stream(id){
  _streamCancelled = true // cancel previous stream
  const myId = Date.now()
  _streamCancelled = false
  const cancelId = myId

  loading=true;$('play-btn').textContent='⏳';playing=false
  if('mediaSession'in navigator)navigator.mediaSession.playbackState='none'
  a.pause();a.removeAttribute('src');a.load()
  a.src=API+'/api/stream/'+id;a.load()

  const canplayHandler = () => {
    a.removeEventListener('canplay', canplayHandler)
    if (_streamCancelled || cancelId !== myId) return
    loading=false
    doPlay(cancelId)
  }
  const errorHandler = () => {
    a.removeEventListener('error', errorHandler)
    if (_streamCancelled || cancelId !== myId) return
    loading=false;$('play-btn').textContent='▶';toast('Skipping...')
    setTimeout(() => { if (!_streamCancelled) nxt() }, 1500)
  }

  a.addEventListener('canplay', canplayHandler)
  a.addEventListener('error', errorHandler)

  setTimeout(() => {
    if (loading && !_streamCancelled && cancelId === myId) {
      loading=false;$('play-btn').textContent='▶';toast('Timeout')
      setTimeout(() => { if (!_streamCancelled) nxt() }, 1500)
    }
  }, 35000)
}

function doPlay(cid){
  a.play().catch(()=>setTimeout(()=>a.play().catch(()=>{
    if(_streamCancelled)return
    loading=false;$('play-btn').textContent='▶';toast('Play failed')
    setTimeout(() => { if (!_streamCancelled) nxt() }, 1500)
  }),500))
  playing=true;$('play-btn').textContent='⏸';$('np-play').textContent='⏸'
}

function togglePlay(){
  if(!cur)return
  if(playing){a.pause();$('play-btn').textContent='▶';$('np-play').textContent='▶'}
  else{a.play().catch(()=>{});$('play-btn').textContent='⏸';$('np-play').textContent='⏸'}
  playing=!playing
}

function nxt(){
  if(!q.length)return
  _streamCancelled = true
  loading=false;a.pause()
  if(lp==='one'){a.currentTime=0;doPlay(Date.now());return}

  if (qi < q.length - 1) {
    const ni = sf ? Math.floor(Math.random() * (q.length - qi - 1)) + qi + 1 : qi + 1
    playAt(ni)
    return
  }

  // Queue abis — auto-recommend
  if (_recLock) {
    // Lagi proses, tunggu polling
    const checkInt = setInterval(() => {
      if (!_recLock) {
        clearInterval(checkInt)
        if (q.length > 0 && qi < q.length - 1) playAt(qi + 1)
      }
    }, 300)
    // timeout 15 detik
    setTimeout(() => clearInterval(checkInt), 15000)
    return
  }

  doAutoRecommend()
}

function nextBtn(){ nxt() }
function prevBtn(){ prevTrack() }

function prevTrack(){
  if(!q.length||qi<=0)return
  _streamCancelled = true
  loading=false;a.pause()
  playAt(qi-1)
}

function seekTo(e){const r=e.currentTarget.getBoundingClientRect();const p=(e.clientX-r.left)/r.width;if(a.duration)a.currentTime=p*a.duration}
function toggleShuffle(){sf=!sf;$('sf-btn').classList.toggle('on',sf);toast(sf?'Shuffle on':'Shuffle off')}
function toggleLoop(){const m=['none','all','one'];lp=m[(m.indexOf(lp)+1)%m.length];$('lp-btn').classList.toggle('on',lp!=='none');toast(lp==='none'?'Loop off':lp==='all'?'Loop all':'Loop one')}

// ── Auto Recommend ──
async function doAutoRecommend() {
  if (_recLock || !cur) return
  _recLock = true

  // Kalo queue masih banyak, skip
  if (q.length - qi > 2 && q.length > 2) { _recLock = false; return }

  try {
    const qry = encodeURIComponent(cur.title + ' ' + cur.channel + ' music')
    const r = await fetch(API + '/api/search?q=' + qry)
    const d = await r.json()

    const existingIds = new Set(q.map(t => t.id))
    if (cur) existingIds.add(cur.id)

    const fresh = d.filter(t => !existingIds.has(t.id)).slice(0, 6)
    if (fresh.length > 0) {
      for (const track of fresh) {
        q.push({
          id: track.id, title: track.title,
          channel: track.channel, thumbnail: track.thumbnail,
          duration: track.duration
        })
      }
      renderQ()
      toast('🎵 +' + fresh.length + ' recommendations')
      // Play next kalo ada
      if (qi < q.length - 1) playAt(qi + 1)
    } else {
      toast('No recommendations found')
    }
  } catch {}
  _recLock = false
}

// ── Recommendations for Home section ──
let _recTimer
function loadRecs(){
  if(!cur)return
  clearTimeout(_recTimer)
  _recTimer=setTimeout(async()=>{
    try{
      const r=await fetch(API+'/api/search?q='+encodeURIComponent(cur.title+' '+cur.channel+' music'))
      const d=await r.json()
      const f=d.filter(t=>t.id!==cur.id).slice(0,6)
      if(!f.length){$('sec-rec').style.display='none';return}
      $('sec-rec').style.display='block'
      $('rec-hs').innerHTML=f.map(t=>`<div class="hs-it" onclick="playFromRec('${t.id}','${esc(t.title)}','${esc(t.channel)}','${esc(t.thumbnail)}',${t.duration})">
        <div class="art"><img src="${esc(t.thumbnail)}" onerror="this.src='/apple-icon.png'"><div class="ov"></div><div class="pl">▶</div></div>
        <div class="nm">${esc(t.title)}</div><div class="sub">${esc(t.channel)}</div></div>`).join('')
    }catch{}
  },500)
}
function playFromRec(id,title,channel,thumbnail,duration){
  q.push({id,title,channel,thumbnail,duration})
  playAt(q.length-1)
}

// ── Recent ──
function saveRecent(t){
  const arr=recent.filter(r=>r.id!==t.id);arr.unshift(t);recent.length=0;recent.push(...arr.slice(0,10))
  localStorage.setItem('nrk_recent',JSON.stringify(recent));renderRecent()
}
function renderRecent(){
  if(!recent.length){$('sec-recent').style.display='none';return}
  $('sec-recent').style.display='block'
  $('recent-list').innerHTML=recent.map(t=>`<div class="row" onclick="playFromRecent('${t.id}','${esc(t.title)}','${esc(t.channel)}','${esc(t.thumbnail)}',${t.duration})">
    <img class="art" src="${esc(t.thumbnail)}" onerror="this.src='/apple-icon.png'">
    <div class="inf"><div class="t">${esc(t.title)}</div><div class="m">${esc(t.channel)} · ${fmt(t.duration)}</div></div></div>`).join('')
}
function playFromRecent(id,title,channel,thumbnail,duration){
  q.push({id,title,channel,thumbnail,duration});playAt(q.length-1)
}

// ── Media Session ──
function updMediaSession(){
  if(!('mediaSession'in navigator)||!cur)return
  navigator.mediaSession.metadata=new MediaMetadata({title:cur.title,artist:cur.channel,artwork:[{src:cur.thumbnail||'/apple-icon.png',sizes:'512x512',type:'image/png'}]})
  navigator.mediaSession.playbackState=playing?'playing':'paused'
  navigator.mediaSession.setActionHandler('play',()=>togglePlay())
  navigator.mediaSession.setActionHandler('pause',()=>togglePlay())
  navigator.mediaSession.setActionHandler('nexttrack',()=>nxt())
  navigator.mediaSession.setActionHandler('previoustrack',()=>prevTrack())
  navigator.mediaSession.setActionHandler('seekto',d=>{if(a.duration&&d.seekTime)a.currentTime=d.seekTime})
}

renderQ();renderRecent()
</script>
